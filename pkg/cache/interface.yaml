version: 1
package: cache
description: "TTL 기반 key-value 캐시 — ssac interface 계약. postgres 구현체는 yongol 이 이 interface.yaml 로부터 codegen."

ports:
  - name: CacheSet
    description: "키 저장 (upsert, TTL 갱신)"
    when: manifest.cache.backend == "postgres"
    used_by: [Set]
    query:
      cardinality: exec
      params:
        - { name: key, type: string }
        - { name: value, type: "[]byte" }
        - { name: expires_at, type: "time.Time" }

  - name: CacheGet
    description: "미만료 키의 값 조회"
    when: manifest.cache.backend == "postgres"
    used_by: [Get]
    query:
      cardinality: one
      params:
        - { name: key, type: string }
      returns:
        - { name: value, type: "[]byte" }

  - name: CacheDelete
    description: "키 삭제"
    when: manifest.cache.backend == "postgres"
    used_by: [Delete]
    query:
      cardinality: exec
      params:
        - { name: key, type: string }

canonical_ddl: |
  CREATE TABLE fullend_cache (
      key TEXT PRIMARY KEY,
      value BYTEA NOT NULL,
      expires_at TIMESTAMPTZ NOT NULL
  );
  CREATE INDEX idx_fullend_cache_expires ON fullend_cache(expires_at);

canonical_queries: |
  -- name: CacheSet :exec
  INSERT INTO fullend_cache (key, value, expires_at) VALUES (@key, @value, @expires_at)
  ON CONFLICT (key) DO UPDATE SET value = @value, expires_at = @expires_at;

  -- name: CacheGet :one
  SELECT value FROM fullend_cache WHERE key = @key AND expires_at > NOW();

  -- name: CacheDelete :exec
  DELETE FROM fullend_cache WHERE key = @key;
