version: 1
package: session
description: "TTL 기반 사용자 상태 저장소 (login / cart 등) — ssac interface 계약."

ports:
  - name: SessionSet
    description: "세션 키 저장 (upsert, TTL 갱신)"
    when: manifest.session.backend == "postgres"
    used_by: [Set]
    query:
      cardinality: exec
      params:
        - { name: key, type: string }
        - { name: value, type: "[]byte" }
        - { name: expires_at, type: "time.Time" }

  - name: SessionGet
    description: "미만료 세션 키의 값 조회"
    when: manifest.session.backend == "postgres"
    used_by: [Get]
    query:
      cardinality: one
      params:
        - { name: key, type: string }
      returns:
        - { name: value, type: "[]byte" }

  - name: SessionDelete
    description: "세션 키 삭제"
    when: manifest.session.backend == "postgres"
    used_by: [Delete]
    query:
      cardinality: exec
      params:
        - { name: key, type: string }

canonical_ddl: |
  CREATE TABLE fullend_sessions (
      key TEXT PRIMARY KEY,
      value BYTEA NOT NULL,
      expires_at TIMESTAMPTZ NOT NULL
  );
  CREATE INDEX idx_fullend_sessions_expires ON fullend_sessions(expires_at);

canonical_queries: |
  -- name: SessionSet :exec
  INSERT INTO fullend_sessions (key, value, expires_at) VALUES (@key, @value, @expires_at)
  ON CONFLICT (key) DO UPDATE SET value = @value, expires_at = @expires_at;

  -- name: SessionGet :one
  SELECT value FROM fullend_sessions WHERE key = @key AND expires_at > NOW();

  -- name: SessionDelete :exec
  DELETE FROM fullend_sessions WHERE key = @key;
