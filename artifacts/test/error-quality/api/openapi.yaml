openapi: "3.0.0"
info:
  title: Error Quality Test API
  version: "1.0"
paths:
  /login:
    post:
      operationId: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                Email:
                  type: string
                Password:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/User"
  /test5:
    get:
      operationId: Test5External
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                AccountID:
                  type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                  payment:
                    type: object
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
